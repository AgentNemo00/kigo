version: "3"

services:
  KigoMainPath:
    build:
      context: .
      dockerfile: Containerfile
      args:
        "PRVT_KEY": "./id_rsa"
        "MAIN_PATH": "cmd/kigo/main.go"
    ports:
      - "10001:10001"
    networks:
      - default
    restart: always
    environment:
      "APP_CONTAINERIZATION": true
      "APP_PING": true
      "APP_METRICS": true
    
  jaeger:
    image: jaegertracing/all-in-one:1.47
    ports:
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "14250:14250"
      - "14268:14268"
      - "14269:14269"
      - "9411:9411"
    networks:
      - default
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
      COLLECTOR_OTLP_ENABLED: true
  nats:
    image: docker.io/nats:latest
    ports:
      - "4222:4222"
    networks:
      - default